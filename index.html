<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #02040a;
            --glass: rgba(15, 23, 42, 0.7);
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            min-height: 100vh; background: var(--bg-dark); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative; padding: 0 20px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(188, 19, 254, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; z-index: -1;
        }

        .container { 
            width: 100%; max-width: 500px; z-index: 10; 
            display: flex; flex-direction: column; align-items: center;
            animation: fadeIn 0.6s ease-out; margin-top: 60px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area { text-align: center; margin-bottom: 40px; width: 100%; }
        .logo {
            font-size: 50px; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }
        .subtitle { color: #64748b; font-size: 15px; margin-top: 5px; font-weight: 500; }

        .platforms-grid {
            display: flex; justify-content: center; gap: 15px; 
            margin-bottom: 40px; width: 100%; flex-wrap: wrap;
        }
        .p-item {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05);
            width: 70px; height: 70px; border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-size: 26px; transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .p-item:hover { 
            transform: translateY(-5px); border-color: var(--neon-blue);
            box-shadow: 0 10px 20px -10px var(--neon-blue);
        }

        .glass-card {
            width: 100%; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); padding: 35px 25px;
            border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
        }

        #url-input {
            width: 100%; padding: 22px 20px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(20, 28, 45, 0.9);
            color: white; margin-bottom: 25px; text-align: center;
            font-size: 16px; transition: 0.3s; outline: none; box-sizing: border-box;
        }
        #url-input::placeholder { color: #64748b; font-weight: 500; }
        #url-input:focus { border-color: var(--neon-blue); background: rgba(25, 35, 55, 0.9); box-shadow: 0 0 20px rgba(0,242,255,0.15); }

        .btn-glow {
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; font-weight: 900; font-size: 18px; cursor: pointer;
            transition: 0.4s; position: relative; overflow: hidden;
            box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3);
        }
        .btn-glow:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 0 25px rgba(188, 19, 254, 0.5); }
        .btn-glow:active { transform: scale(0.95); }

        .q-header { text-align: center; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; font-weight: bold; color: var(--neon-blue); width: 100%; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .tab-btn { flex: 1; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid #1e293b; color: #94a3b8; cursor: pointer; transition: 0.3s; font-size: 16px; font-weight: bold; }
        .tab-btn.active { border-color: var(--neon-purple); color: white; background: rgba(188, 19, 254, 0.1); }
        #video-results, #audio-results { width: 100%; }
        .q-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer; }
        .q-item:hover { background: rgba(255,255,255,0.05); border-color: var(--neon-blue); padding-right: 25px; }
        .q-item i { color: var(--neon-blue); font-size: 18px; }
        .help-alert { background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2); color: #facc15; padding: 15px; border-radius: 15px; font-size: 13px; margin-top: 20px; display: none; line-height: 1.6; width: 100%; text-align: center; }

        footer { margin-top: auto; padding: 30px 0; color: #475569; font-size: 12px; letter-spacing: 1px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container" id="main-ui">
        <div class="logo-area">
            <h1 class="logo">Darsh Egypt</h1>
            <p class="subtitle">Premium Media Downloader</p>
        </div>

        <div class="platforms-grid">
            <div class="p-item"><i class="fab fa-youtube" style="color:#ff0000"></i></div>
            <div class="p-item"><i class="fab fa-tiktok" style="color:#ffffff"></i></div>
            <div class="p-item"><i class="fab fa-facebook-f" style="color:#007bff"></i></div>
            <div class="p-item"><i class="fab fa-instagram" style="color:#ff0069"></i></div>
        </div>

        <div class="glass-card">
            <input type="text" id="url-input" placeholder="الصق رابط الفيديو هنا...">
            <button class="btn-glow" id="download-btn" onclick="startProcess()">ابدأ التحميل الذكي <i class="fas fa-bolt"></i></button>
            <p id="status-text" style="margin-top:20px; font-size:14px; color:#64748b; font-weight: bold; text-align: center;">بانتظار الرابط... 🚀</p>
        </div>
    </div>

    <div class="container" id="results-ui" style="display:none; margin-top: 40px;">
        <div class="glass-card">
            <div class="q-header"><i class="fas fa-layer-group"></i> اختر جودة التحميل</div>
            
            <div class="tabs">
                <button class="tab-btn active" id="v-tab" onclick="toggleTab('v')"><i class="fas fa-video"></i> فيديو</button>
                <button class="tab-btn" id="a-tab" onclick="toggleTab('a')"><i class="fas fa-music"></i> صوت</button>
            </div>

            <div id="video-results"></div>
            <div id="audio-results" style="display:none;"></div>

            <div class="help-alert" id="help-box">
                <b>ملحوظة هامة:</b> إذا فتح الفيديو بدلاً من التحميل، اضغط على النقاط الثلاث (⋮) ثم اختر "تنزيل" (Download).
            </div>

            <button class="tab-btn" style="width:100%; margin-top:25px; border-style:dashed;" onclick="location.reload()">تحميل فيديو جديد 🔄</button>
        </div>
    </div>

    <footer>BY DARSH EGYPT © 2026</footer>

    <script>
        function toggleTab(type) {
            document.getElementById('v-tab').classList.toggle('active', type === 'v');
            document.getElementById('a-tab').classList.toggle('active', type === 'a');
            document.getElementById('video-results').style.display = type === 'v' ? 'block' : 'none';
            document.getElementById('audio-results').style.display = type === 'a' ? 'block' : 'none';
        }

        async function startProcess() {
            const url = document.getElementById('url-input').value.trim();
            const status = document.getElementById('status-text');
            const btn = document.getElementById('download-btn');
            
            if(!url) {
                alert("يرجى وضع رابط الفيديو أولاً!");
                return;
            }

            // تعطيل الزر مؤقتاً عشان المستخدم ميدوسش مرتين
            btn.disabled = true;
            btn.style.opacity = '0.7';

            // لو الرابط تيك توك أو انستا
            const isSocial = url.includes("tiktok.com") || url.includes("instagram.com");

            if(isSocial) {
                status.innerText = "جاري التحويل لموقع التحميل المباشر... ⏳";
                status.style.color = 'var(--neon-blue)';
                setTimeout(() => {
                    window.location.href = `https://9xbuddy.com/process?url=${encodeURIComponent(url)}`;
                }, 1000);
            } else {
                fetchQualities(url, btn, status);
            }
        }

        async function fetchQualities(videoUrl, btn, status) {
            status.innerText = "جاري سحب الجودات... الرجاء الانتظار ✨";
            status.style.color = "var(--neon-blue)";
            
            try {
                const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({url: videoUrl})
                });

                if(!res.ok) throw new Error("API Not Responding");

                const data = await res.json();
                
                // التأكد إن فيه جودات رجعت من السيرفر
                if(!data || !data.sizes || data.sizes.length === 0) {
                    throw new Error("No qualities found");
                }
                
                showResults(data);
            } catch(e) {
                console.error("Error:", e);
                status.innerText = "عذراً! الرابط غير صحيح أو السيرفر لا يدعمه ❌";
                status.style.color = "#ff4444"; // لون أحمر للتنبيه
                
                // إعادة تفعيل الزر لو حصل خطأ
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        function showResults(data) {
            // إخفاء الواجهة الأولى وإظهار التانية
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('results-ui').style.display = 'flex';

            const vContainer = document.getElementById('video-results');
            const aContainer = document.getElementById('audio-results');
            
            vContainer.innerHTML = '';
            aContainer.innerHTML = '';

            // ترتيب الجودات من الأعلى (1080) للأقل (144)
            const sorted = (data.sizes || []).sort((a,b) => (parseInt(b.height)||0) - (parseInt(a.height)||0));

            sorted.forEach(item => {
                const isAudio = item.resolution === 'audio only' || !item.height;
                const row = `
                    <div class="q-item" onclick="window.open('${item.url}', '_blank'); document.getElementById('help-box').style.display='block';">
                        <span>${isAudio ? 'ملف صوتي MP3 🎧' : item.height + 'p High Quality 🎬'}</span>
                        <i class="fas fa-arrow-down"></i>
                    </div>
                `;
                if(isAudio) aContainer.innerHTML += row;
                else vContainer.innerHTML += row;
            });
        }
    </script>
</body>
</html>
