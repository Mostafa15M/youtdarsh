<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YoutDarsh - تحميل فيديوهات بسرعة فائقة</title>
  <meta name="description" content="YoutDarsh - أسرع موقع لتحميل يوتيوب وتيك توك بدون علامة مائية - بواسطة Bob"/>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ff1744;
      --primary-dark: #c6002f;
      --bg1: #0d0015;
      --bg2: #15000d;
      --bg3: #1a001f;
      --card: rgba(18, 18, 35, 0.82);
      --text: #ffffff;
      --gray: #bbbbd0;
      --border: rgba(255, 23, 68, 0.22);
      --shadow: 0 20px 50px rgba(255, 23, 68, 0.28);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
      background-size: 400% 400%;
      animation: bgFlow 22s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    @keyframes bgFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 50px 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin: 30px auto;
    }

    .logo {
      font-size: 4.2rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff4081, var(--primary), #ff5252);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    .tagline {
      text-align: center;
      color: var(--gray);
      font-size: 1.3rem;
      margin-bottom: 50px;
      line-height: 1.6;
    }

    .input-box {
      position: relative;
      margin-bottom: 40px;
    }

    #url {
      width: 100%;
      padding: 22px 24px 22px 65px;
      font-size: 1.2rem;
      background: rgba(25, 25, 45, 0.65);
      border: 2px solid rgba(255, 23, 68, 0.35);
      border-radius: 18px;
      color: white;
      outline: none;
      transition: all 0.4s ease;
    }

    #url:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 6px rgba(255, 23, 68, 0.25);
      background: rgba(25, 25, 45, 0.9);
    }

    .icon {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.9rem;
      color: var(--gray);
    }

    .btn-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 45px;
    }

    button {
      padding: 18px 36px;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 15px 35px rgba(255, 23, 68, 0.45);
    }

    .btn-secondary {
      background: transparent;
      border: 2.5px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(255, 23, 68, 0.1);
      transform: translateY(-4px);
    }

    #status {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 500;
      margin: 30px 0;
      min-height: 2em;
      transition: all 0.4s;
    }

    #progress {
      height: 16px;
      background: rgba(30, 30, 50, 0.6);
      border-radius: 8px;
      overflow: hidden;
      margin: 25px 0;
      display: none;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #ff5252, #ff4081);
      transition: width 0.6s ease;
      box-shadow: 0 0 20px rgba(255, 23, 68, 0.7);
    }

    #qualities {
      margin-top: 40px;
      display: none;
    }

    .quality-item {
      background: rgba(25, 25, 45, 0.5);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      transition: all 0.3s;
    }

    .quality-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 23, 68, 0.25);
      border-color: var(--primary);
    }

    .quality-info {
      flex: 1;
      min-width: 200px;
    }

    .quality-btn {
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .quality-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    footer {
      margin-top: auto;
      padding: 80px 0 50px;
      color: #666677;
      font-size: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">YoutDarsh</div>
  <div class="subtitle">تحميل فيديوهات يوتيوب وتيك توك بجودة عالية وبسرعة صاروخية – بدون علامة مائية</div>

  <div class="input-box">
    <input type="text" id="url" placeholder="الصق رابط الفيديو هنا..." autocomplete="off" />
    <span class="icon">🔗</span>
  </div>

  <div class="btn-group">
    <button class="btn-primary" onclick="getQualities()">جلب الجودات</button>
    <button class="btn-primary" onclick="downloadBest()">تحميل أفضل جودة</button>
    <button class="btn-secondary" onclick="downloadAudio()">تحميل الصوت فقط (MP3)</button>
  </div>

  <div id="status">جاهز يا بوب... 🔥</div>

  <div id="progress">
    <div id="progress-bar"></div>
  </div>

  <div id="qualities"></div>
</div>

<footer>
  © YoutDarsh – تم تصميمه وتطويره بواسطة Bob | 2026
</footer>

<script>
// ──────────────────────────────────────────────
const urlInput = document.getElementById('url');
const statusEl = document.getElementById('status');
const progressEl = document.getElementById('progress');
const progressBar = document.getElementById('progress-bar');
const qualitiesEl = document.getElementById('qualities');

let isLoading = false;

function updateStatus(text, color = '#4caf50') {
  statusEl.textContent = text;
  statusEl.style.color = color;
}

function showLoading(show = true) {
  progressEl.style.display = show ? 'block' : 'none';
  progressBar.style.width = show ? '0%' : '0%';
}

async function fetchAPI(endpoint, body) {
  if (isLoading) return;
  isLoading = true;
  showLoading(true);
  updateStatus('جاري الاتصال...');

  try {
    progressBar.style.width = '40%';

    const res = await fetch(`https://api.get-save.com/api/v1/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) throw new Error('مشكلة في الخادم');

    progressBar.style.width = '80%';
    const data = await res.json();

    progressBar.style.width = '100%';
    return data;

  } catch (err) {
    updateStatus('خطأ: ' + err.message, '#ff1744');
    throw err;
  } finally {
    isLoading = false;
    setTimeout(() => showLoading(false), 1000);
  }
}

async function getQualities() {
  const url = urlInput.value.trim();
  if (!url) return updateStatus('أدخل رابط صحيح يا بوب!', '#ff1744');

  try {
    const data = await fetchAPI('vidinfo', { url });
    qualitiesEl.style.display = 'block';
    qualitiesEl.innerHTML = '';

    if (!data.sizes || data.sizes.length === 0) {
      updateStatus('مفيش جودات متاحة حاليًا', '#ff9800');
      return;
    }

    updateStatus(`تم جلب ${data.sizes.length} جودة بنجاح ✓`, '#4caf50');

    const title = data.meta?.title || 'فيديو بدون عنوان';
    const thumb = data.meta?.thumbnail || '';

    let html = `<h3 style="text-align:center; margin-bottom:20px;">${title}</h3>`;
    if (thumb) html += `<img src="${thumb}" style="width:100%; max-width:360px; border-radius:12px; display:block; margin:0 auto 25px;" alt="thumbnail"/>`;

    data.sizes.forEach((item, index) => {
      const res = item.resolution || item.height ? `${item.height || 'صوت فقط'}p` : 'غير معروف';
      const ext = item.ext || 'mp4';
      const size = item.filesize ? `${(item.filesize / 1024 / 1024).toFixed(1)} MB` : 'غير معروف';

      html += `
        <div class="quality-item">
          <div class="quality-info">
            <strong>${index + 1} - ${res}</strong> • ${ext} • ${size}
          </div>
          <button class="quality-btn" onclick="window.open('${item.url}', '_blank')">تحميل</button>
        </div>
      `;
    });

    qualitiesEl.innerHTML = html;

  } catch (err) {}
}

async function downloadBest() {
  updateStatus('جاري تحميل أعلى جودة متاحة...');
  // نفس المنطق اللي فوق، بس نختار أول url من sizes (أو أفضل واحد)
  // لو عايز نعدل عشان يختار أعلى دقة، قولي ونضيف المنطق
  try {
    const data = await fetchAPI('download', { url: urlInput.value.trim(), type: 'video' });
    if (data.url) window.open(data.url, '_blank');
  } catch {}
}

async function downloadAudio() {
  updateStatus('جاري تحميل الصوت (MP3)...');
  try {
    const data = await fetchAPI('download', { url: urlInput.value.trim(), type: 'audio' });
    if (data.url) window.open(data.url, '_blank');
  } catch {}
}
</script>
</body>
</html>
