<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            min-height: 100vh; color: white; display: flex; flex-direction: column;
            align-items: center; padding: 25px; background: #020617; overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20% 30%, #38bdf8, transparent), radial-gradient(2px 2px at 80% 40%, #a855f7, transparent);
            background-size: 600px 600px; animation: stars 40s linear infinite; z-index: -1;
        }
        @keyframes stars { 0% {transform: translateY(0)} 100% {transform: translateY(-600px)} }

        .container { width: 100%; max-width: 480px; text-align: center; }
        .logo {
            font-size: 42px; font-weight: 900;
            background: linear-gradient(90deg, #00e5ff, #a855f7, #00e5ff);
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: colorShift 8s linear infinite;
        }
        @keyframes colorShift { 0%{background-position:0%} 100%{background-position:200%} }
        
        .subtitle { color: #94a3b8; font-size: 14px; margin: 10px 0 30px; }

        .input-box {
            background: rgba(15, 23, 42, 0.6); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }
        #url {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #1e293b;
            background: #0b1225; color: white; margin-bottom: 15px; text-align: center; outline: none;
        }

        .main-btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 700; background: linear-gradient(90deg, #00e5ff, #a855f7);
            color: white; cursor: pointer; transition: 0.3s;
        }

        .quality-container {
            border: 2px solid #5b21b6; border-radius: 25px; padding: 15px;
            background: rgba(10, 15, 30, 0.95); display: none; margin-top: 20px;
        }
        .quality-header {
            background: linear-gradient(90deg, #00e5ff, #a855f7);
            padding: 12px; border-radius: 15px; font-weight: 800; margin-bottom: 20px;
        }
        
        .tab-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 15px 5px; border-radius: 15px; border: 1px solid #1e293b;
            cursor: pointer; transition: 0.3s;
        }
        .tab.active { border-color: #00e5ff; background: rgba(0, 229, 255, 0.05); }
        .tab.active i { color: #00e5ff; }

        .quality-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #161b2e; padding: 15px 20px; border-radius: 12px;
            margin-bottom: 8px; cursor: pointer; border: 1px solid transparent;
        }
        .quality-item:hover { border-color: #00e5ff; }

        #download-help {
            display: none; background: #facc15; color: #000;
            padding: 10px; border-radius: 10px; font-size: 12px;
            margin-top: 15px; font-weight: bold;
        }

        footer { margin-top: 40px; font-size: 11px; color: #475569; }
    </style>
</head>
<body>

    <div class="container" id="main-page">
        <div class="logo">Darsh Egypt</div>
        <p class="subtitle">تنزيل من يوتيوب - تيك توك - فيسبوك - إنستا</p>
        
        <div style="display:flex; gap:10px; margin-bottom:30px; justify-content:center;">
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-instagram" style="font-size:24px; color:#e1306c"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-facebook-f" style="font-size:24px; color:#1877f2"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-tiktok" style="font-size:24px;"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-youtube" style="font-size:24px; color:#ff0000"></i>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="url" placeholder="أدخل رابط الفيديو هنا...">
            <button class="main-btn" onclick="fetchData()">ابدأ التحميل الآن! ⬇</button>
            <div id="status" style="margin-top:15px; font-size:13px; color:#94a3b8">جاهز 🔥</div>
        </div>
    </div>

    <div class="container" id="qualities-page">
        <div class="quality-container" id="q-box">
            <div class="quality-header">⬇ Quality</div>
            <div class="tab-group">
                <div class="tab active" id="v-tab" onclick="switchTab('v')"><i class="fas fa-play"></i><br><b>فيديو</b></div>
                <div class="tab" id="a-tab" onclick="switchTab('a')"><i class="fas fa-music"></i><br><b>صوت</b></div>
            </div>
            <div id="list-v"></div>
            <div id="list-a" style="display:none"></div>
            
            <div id="download-help">
                ⚠️ إذا فتح الفيديو للمشاهدة: اضغط على الـ (3 نقاط) أسفل الفيديو ثم اختر "تنزيل" (Download).
            </div>
        </div>
        <button class="main-btn" id="back-btn" style="display:none; margin-top:20px; background:#1e293b;" onclick="location.reload()">تحميل فيديو آخر</button>
    </div>

    <footer>© Darsh Egypt</footer>

    <script>
        function downloadAction(url) {
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('target', '_blank');
            document.body.appendChild(link);
            link.click();
            link.remove();
            document.getElementById('download-help').style.display = 'block';
        }

        function switchTab(t) {
            document.getElementById('v-tab').classList.toggle('active', t=='v');
            document.getElementById('a-tab').classList.toggle('active', t=='a');
            document.getElementById('list-v').style.display = t=='v'?'block':'none';
            document.getElementById('list-a').style.display = t=='a'?'block':'none';
        }

        async function fetchData() {
            const val = document.getElementById('url').value;
            if(!val) return alert("حط الرابط!");
            
            document.getElementById('status').innerText = "جاري البحث...";
            
            try {
                const res = await fetch('https://api.get-save.com/api/v1/vidinfo', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: val})
                });
                const data = await res.json();
                
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('q-box').style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';

                const lv = document.getElementById('list-v');
                const la = document.getElementById('list-a');
                lv.innerHTML = ''; la.innerHTML = '';

                // --- التعديل هنا لترتيب الجودات من الأعلى للأسفل ---
                const sortedSizes = data.sizes.sort((a, b) => {
                    const heightA = parseInt(a.height) || 0;
                    const heightB = parseInt(b.height) || 0;
                    return heightB - heightA; // ترتيب تنازلي
                });

                sortedSizes.forEach(s => {
                    const isA = s.resolution === 'audio only' || !s.height;
                    const html = `
                        <div class="quality-item" onclick="downloadAction('${s.url}')">
                            <span>${isA ? 'صوت MP3' : s.height+'p'}</span>
                            <i class="fas fa-download" style="color:#00e5ff"></i>
                        </div>
                    `;
                    if(isA) la.innerHTML += html; else lv.innerHTML += html;
                });
            } catch(e) { document.getElementById('status').innerText = "خطأ في الرابط!"; }
        }
    </script>
</body>
</html>
