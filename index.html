<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Darsh Egypt</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

/* الخلفية */

body{

min-height:100vh;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:25px;

background:linear-gradient(120deg,#020617,#020617,#020617,#020617);
overflow-x:hidden;

}

/* النجوم المتحركة */

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(2px 2px at 20% 30%,#38bdf8,transparent),
radial-gradient(2px 2px at 80% 40%,#a855f7,transparent),
radial-gradient(2px 2px at 40% 80%,#38bdf8,transparent),
radial-gradient(2px 2px at 70% 70%,#a855f7,transparent);

background-size:600px 600px;

animation:stars 40s linear infinite;

z-index:-1;

}

@keyframes stars{

0%{transform:translateY(0)}
100%{transform:translateY(-600px)}

}

.container{
width:100%;
max-width:500px;
text-align:center;
}

/* اللوجو المتغير */

.logo{

font-size:38px;
font-weight:900;

background:linear-gradient(90deg,#00e5ff,#a855f7,#00e5ff);

background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:colorShift 6s linear infinite;

}

@keyframes colorShift{

0%{background-position:0%}
100%{background-position:200%}

}

.subtitle{

color:#94a3b8;
font-size:13px;
margin:10px 0 25px;

}

/* ايقونات المنصات */

.platforms{

display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;

}

.platform-icon{

width:48px;
height:48px;

border-radius:12px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.1);

display:flex;
align-items:center;
justify-content:center;

font-size:18px;

transition:.3s;

}

.platform-icon:hover{

transform:translateY(-4px);

box-shadow:0 0 15px #00e5ff;

}

/* حقل الرابط */

#url{

width:100%;
padding:14px;

border-radius:10px;

border:1px solid #1e293b;

background:#0b1225;

color:white;

font-size:14px;

outline:none;

margin-bottom:10px;

}

/* زر التحميل */

.main-btn{

width:100%;
padding:14px;

border:none;

border-radius:12px;

font-weight:700;

background:linear-gradient(90deg,#00e5ff,#a855f7);

cursor:pointer;

transition:.3s;

}

.main-btn:hover{

box-shadow:0 0 20px #00e5ff;

}

/* الحالة */

#status{

margin-top:10px;
color:#94a3b8;
font-size:13px;

}

/* صفحة الجودات */

.quality-title{

margin-top:25px;

background:linear-gradient(90deg,#00e5ff,#a855f7);

padding:10px;

border-radius:10px;

}

/* التبويبات */

.tab-group{

display:flex;
gap:10px;
margin:15px 0;

}

.tab{

flex:1;
padding:10px;

border-radius:10px;

background:#0b1225;

border:1px solid #1e293b;

cursor:pointer;

}

.tab.active{

background:linear-gradient(90deg,#00e5ff,#a855f7);
color:black;

}

/* صورة الفيديو */

.thumb{

width:100%;
border-radius:12px;
margin-bottom:15px;

}

/* قائمة الجودات */

.quality-list{

display:flex;
flex-direction:column;
gap:10px;

}

/* كارت الجودة */

.quality-card{

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.1);

border-radius:12px;

padding:12px;

animation:fadeIn .4s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.quality-title-text{
font-size:14px;
font-weight:700;
}

.quality-desc{
font-size:11px;
color:#94a3b8;
}

.dl-btn{

background:#00e5ff;

border:none;

padding:7px 12px;

border-radius:8px;

font-weight:700;

cursor:pointer;

}

.dl-btn:hover{

background:#a855f7;
color:white;

}

footer{

margin-top:40px;
font-size:12px;
color:#475569;

}

</style>

</head>

<body>

<div class="container" id="main-page">

<div class="logo">Darsh Egypt</div>

<div class="subtitle">
تحميل من يوتيوب - تيك توك - فيسبوك - إنستجرام
</div>

<div class="platforms">

<div class="platform-icon"><i class="fab fa-instagram"></i></div>
<div class="platform-icon"><i class="fab fa-facebook-f"></i></div>
<div class="platform-icon"><i class="fab fa-tiktok"></i></div>
<div class="platform-icon"><i class="fab fa-youtube"></i></div>

</div>

<input type="text" id="url" placeholder="أدخل رابط الفيديو">

<button class="main-btn" onclick="getQualities()">⬇ ابدأ التحميل</button>

<div id="status">جاهز 🔥</div>

</div>

<div class="container" id="qualities-page" style="display:none">

<div class="quality-title">⬇ Quality</div>

<img id="thumb" class="thumb" style="display:none">

<div class="tab-group">

<div class="tab active" onclick="showTab('video')">🎬 فيديو</div>
<div class="tab" onclick="showTab('audio')">🎧 صوت</div>

</div>

<div id="video-tab" class="quality-list"></div>
<div id="audio-tab" class="quality-list" style="display:none"></div>

</div>

<footer>© Darsh Egypt</footer>

<script>

const urlInput=document.getElementById('url')
const statusEl=document.getElementById('status')
const mainPage=document.getElementById('main-page')
const qualitiesPage=document.getElementById('qualities-page')
const thumbImg=document.getElementById('thumb')
const videoTab=document.getElementById('video-tab')
const audioTab=document.getElementById('audio-tab')

function updateStatus(text,color='#00e5ff'){
statusEl.textContent=text
statusEl.style.color=color
}

function showTab(type){

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
event.target.classList.add('active')

videoTab.style.display= type==='video'?'flex':'none'
audioTab.style.display= type==='audio'?'flex':'none'

}

async function getQualities(){

const url=urlInput.value.trim()

if(!url) return updateStatus('أدخل رابط')

updateStatus('جاري جلب الجودات...')

try{

const res=await fetch('https://api.get-save.com/api/v1/vidinfo',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({url})
})

const data=await res.json()

mainPage.style.display='none'
qualitiesPage.style.display='block'

videoTab.innerHTML=''
audioTab.innerHTML=''

if(data.meta?.thumbnail){
thumbImg.src=data.meta.thumbnail
thumbImg.style.display='block'
}

/* ترتيب الجودات */

const sorted=[...data.sizes].sort((a,b)=>(b.height||0)-(a.height||0))

sorted.forEach((item,index)=>{

const isAudio=item.resolution==='audio only'||!item.height

let label=''

if(!isAudio){

if(index===0) label=' • UHD'
else if(item.height>=720) label=' • HD'

}

const resText=isAudio?'MP3 صوت':item.height+'p'

const card=`

<div class="quality-card">

<div>

<div class="quality-title-text">${resText}${label}</div>

<div class="quality-desc">${item.ext}</div>

</div>

<button class="dl-btn" onclick="window.open('${item.url}')">
تحميل
</button>

</div>

`

if(isAudio){
audioTab.innerHTML+=card
}else{
videoTab.innerHTML+=card
}

})

}catch{

updateStatus('خطأ','#ff1744')

}

}

</script>

</body>
</html>
