<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(15, 23, 42, 0.8); --neon-blue: #00f2ff; --neon-purple: #bc13fe; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { min-height: 100vh; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 0 20px; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(188, 19, 254, 0.05) 0%, transparent 40%); z-index: -1; }
        .container { width: 100%; max-width: 500px; z-index: 10; display: flex; flex-direction: column; align-items: center; margin-top: 60px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .logo { font-size: 50px; font-weight: 900; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3)); text-align: center; }
        .subtitle { color: #64748b; font-size: 15px; margin-bottom: 40px; text-align: center; }
        .platforms-grid { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .p-item { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); width: 65px; height: 65px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; backdrop-filter: blur(10px); }
        .glass-card { width: 100%; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #url-input { width: 100%; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: #0a0f1d; color: white; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; }
        .btn-glow { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: white; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-glow:disabled { opacity: 0.5; cursor: not-allowed; }
        .q-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .q-item:hover { border-color: var(--neon-blue); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #1e293b; background: none; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: rgba(188, 19, 254, 0.2); color: white; border-color: var(--neon-purple); }
        footer { margin-top: 50px; color: #475569; font-size: 12px; text-align: center; padding-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container" id="main-ui">
        <h1 class="logo">Darsh Egypt</h1>
        <p class="subtitle">Premium Media Downloader</p>

        <div class="platforms-grid">
            <div class="p-item"><i class="fab fa-youtube" style="color:#ff0000"></i></div>
            <div class="p-item"><i class="fab fa-tiktok"></i></div>
            <div class="p-item"><i class="fab fa-facebook-f" style="color:#007bff"></i></div>
            <div class="p-item"><i class="fab fa-instagram" style="color:#ff0069"></i></div>
        </div>

        <div class="glass-card">
            <input type="text" id="url-input" placeholder="ضع رابط الفيديو هنا...">
            <button class="btn-glow" id="dl-btn" onclick="startProcess()">ابدأ التحميل الآن! ⬇</button>
            <p id="status" style="margin-top:15px; text-align:center; font-size:14px; color:#64748b;">جاهز للعمل 🔥</p>
        </div>
    </div>

    <div class="container" id="results-ui" style="display:none;">
        <div class="glass-card">
            <div class="tabs">
                <button class="tab-btn active" id="v-btn" onclick="switchTab('v')">فيديو</button>
                <button class="tab-btn" id="a-btn" onclick="switchTab('a')">صوت</button>
            </div>
            <div id="v-list"></div>
            <div id="a-list" style="display:none;"></div>
            <button class="tab-btn" style="width:100%; margin-top:20px;" onclick="location.reload()">تحميل فيديو جديد 🔄</button>
        </div>
    </div>

    <footer>BY DARSH EGYPT © 2026</footer>

    <script>
        function switchTab(t) {
            document.getElementById('v-btn').classList.toggle('active', t=='v');
            document.getElementById('a-btn').classList.toggle('active', t=='a');
            document.getElementById('v-list').style.display = t=='v'?'block':'none';
            document.getElementById('a-list').style.display = t=='a'?'block':'none';
        }

        async function startProcess() {
            const urlInput = document.getElementById('url-input').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('dl-btn');

            if(!urlInput) return alert("حط الرابط!");

            // فحص تيك توك وانستا
            if(urlInput.includes("tiktok.com") || urlInput.includes("instagram.com")) {
                status.innerText = "جاري التحويل...";
                window.location.href = `https://9xbuddy.com/process?url=${encodeURIComponent(urlInput)}`;
                return;
            }

            btn.disabled = true;
            status.innerText = "جاري جلب البيانات (قد يستغرق 5 ثوان)... ⏳";
            status.style.color = "#00f2ff";

            try {
                // الحل السحري: استخدام All Origins Proxy لتخطي حماية الـ CORS
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetApi = 'https://api.get-save.com/api/v1/vidinfo';
                
                const response = await fetch(`${proxyUrl}${encodeURIComponent(targetApi)}`, {
                    method: 'POST', // البروكسي هيحولها لـ POST للـ API
                    body: JSON.stringify({ url: urlInput })
                });

                // ملاحظة: لو البروكسي المجاني ده واجه ضغط، هنحتاج نبعت الطلب بشكل مباشر بـ fetch عادي 
                // لكن بما إنك بتجرب من المتصفح، الـ fetch المباشر ده هو اللي هيشتغل:
                
                const directRes = await fetch(targetApi, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await directRes.json();
                renderResults(data);

            } catch (e) {
                status.innerText = "خطأ: السيرفر لم يستجب. تأكد من الرابط!";
                status.style.color = "#ff4444";
                btn.disabled = false;
            }
        }

        function renderResults(data) {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('results-ui').style.display = 'flex';
            
            const vList = document.getElementById('v-list');
            const aList = document.getElementById('a-list');
            
            const sorted = (data.sizes || []).sort((a,b) => (parseInt(b.height)||0) - (parseInt(a.height)||0));

            sorted.forEach(item => {
                const isAudio = !item.height || item.resolution === 'audio only';
                const row = `
                    <div class="q-item" onclick="window.open('${item.url}', '_blank')">
                        <span>${isAudio ? 'صوت MP3 عالية الجودة' : item.height + 'p - تحويل مباشر'}</span>
                        <i class="fas fa-download" style="color:var(--neon-blue)"></i>
                    </div>`;
                if(isAudio) aList.innerHTML += row; else vList.innerHTML += row;
            });
        }
    </script>
</body>
</html>
