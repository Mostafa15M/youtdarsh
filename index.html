<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt - Smart Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* التنسيق ثابت كما في الصور السابقة لضمان الشكل الجديد */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body {
            min-height: 100vh; color: white; display: flex; flex-direction: column;
            align-items: center; padding: 25px; background: #020617; overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20% 30%, #38bdf8, transparent), radial-gradient(2px 2px at 80% 40%, #a855f7, transparent);
            background-size: 600px 600px; animation: stars 40s linear infinite; z-index: -1;
        }
        @keyframes stars { 0% {transform: translateY(0)} 100% {transform: translateY(-600px)} }
        .container { width: 100%; max-width: 480px; text-align: center; }
        .logo { font-size: 42px; font-weight: 900; background: linear-gradient(90deg, #00e5ff, #a855f7, #00e5ff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: colorShift 8s linear infinite; }
        @keyframes colorShift { 0%{background-position:0%} 100%{background-position:200%} }
        .subtitle { color: #94a3b8; font-size: 14px; margin: 10px 0 30px; }
        .input-box { background: rgba(15, 23, 42, 0.6); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        #url { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #1e293b; background: #0b1225; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; background: linear-gradient(90deg, #00e5ff, #a855f7); color: white; cursor: pointer; transition: 0.3s; }
        .quality-container { border: 2px solid #5b21b6; border-radius: 25px; padding: 15px; background: rgba(10, 15, 30, 0.95); display: none; margin-top: 20px; }
        .quality-header { background: linear-gradient(90deg, #00e5ff, #a855f7); padding: 12px; border-radius: 15px; font-weight: 800; margin-bottom: 20px; }
        .tab-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px 5px; border-radius: 15px; border: 1px solid #1e293b; cursor: pointer; }
        .tab.active { border-color: #00e5ff; background: rgba(0, 229, 255, 0.05); }
        .quality-item { display: flex; justify-content: space-between; align-items: center; background: #161b2e; padding: 15px 20px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
        #download-help { display: none; background: #facc15; color: #000; padding: 10px; border-radius: 10px; font-size: 12px; margin-top: 15px; font-weight: bold; }
        footer { margin-top: 40px; font-size: 11px; color: #475569; }
    </style>
</head>
<body>

    <div class="container" id="main-page">
        <div class="logo">Darsh Egypt</div>
        <p class="subtitle">تنزيل من يوتيوب - تيك توك - فيسبوك - إنستا</p>
        
        <div style="display:flex; gap:10px; margin-bottom:30px; justify-content:center;">
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-instagram" style="font-size:24px; color:#e1306c"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-facebook-f" style="font-size:24px; color:#1877f2"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-tiktok" style="font-size:24px;"></i>
            </div>
            <div style="width:65px; height:65px; border:1px solid #334155; border-radius:15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.02)">
                <i class="fab fa-youtube" style="font-size:24px; color:#ff0000"></i>
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="url" placeholder="أدخل رابط الفيديو هنا...">
            <button class="main-btn" onclick="processDownload()">ابدأ التحميل الآن! ⬇</button>
            <div id="status" style="margin-top:15px; font-size:13px; color:#94a3b8">جاهز 🔥</div>
        </div>
    </div>

    <div class="container" id="qualities-page">
        <div class="quality-container" id="q-box">
            <div class="quality-header">⬇ Quality</div>
            <div class="tab-group">
                <div class="tab active" id="v-tab" onclick="switchTab('v')"><i class="fas fa-play"></i><br><b>فيديو</b></div>
                <div class="tab" id="a-tab" onclick="switchTab('a')"><i class="fas fa-music"></i><br><b>صوت</b></div>
            </div>
            <div id="list-v"></div>
            <div id="list-a" style="display:none"></div>
            <div id="download-help">⚠️ إذا فتح الفيديو للمشاهدة: اضغط على الـ (3 نقاط) أسفل الفيديو ثم اختر "تنزيل".</div>
        </div>
        <button class="main-btn" id="back-btn" style="display:none; margin-top:20px; background:#1e293b;" onclick="location.reload()">تحميل فيديو آخر</button>
    </div>

    <footer>© Darsh Egypt</footer>

    <script>
        function downloadAction(url) {
            window.open(url, '_blank');
            document.getElementById('download-help').style.display = 'block';
        }

        function switchTab(t) {
            document.getElementById('v-tab').classList.toggle('active', t=='v');
            document.getElementById('a-tab').classList.toggle('active', t=='a');
            document.getElementById('list-v').style.display = t=='v'?'block':'none';
            document.getElementById('list-a').style.display = t=='a'?'block':'none';
        }

        async function processDownload() {
            const inputUrl = document.getElementById('url').value.trim();
            const statusEl = document.getElementById('status');
            if(!inputUrl) return alert("حط الرابط!");

            statusEl.innerText = "جاري الفحص وتحديد المنصة...";

            // تحديد الـ API المناسب بناءً على الرابط
            let apiUrl = "";
            const isYT_FB = inputUrl.includes("youtube.com") || inputUrl.includes("youtu.be") || inputUrl.includes("facebook.com") || inputUrl.includes("fb.watch");
            const isTT_IG = inputUrl.includes("tiktok.com") || inputUrl.includes("instagram.com");

            if (isYT_FB) {
                apiUrl = 'https://api.get-save.com/api/v1/vidinfo'; // الـ API الحالي لليوتيوب والفيس
            } else if (isTT_IG) {
                apiUrl = 'ضع_رابط_الـ_API_الجديد_هنا'; // استبدل هذا برابط الـ API الخاص بالتيك توك والإنستا
            } else {
                statusEl.innerText = "رابط غير مدعوم حالياً!";
                return;
            }

            if (apiUrl === 'ضع_رابط_الـ_API_الجديد_هنا') {
                statusEl.innerText = "الـ API الخاص بالتيك توك لم يضف بعد!";
                return;
            }

            statusEl.innerText = "جاري جلب البيانات...";
            
            try {
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: inputUrl})
                });
                const data = await res.json();
                
                // الانتقال لصفحة الجودات الموحدة
                displayResults(data);
            } catch(e) { 
                statusEl.innerText = "خطأ في الاتصال بالـ API!"; 
            }
        }

        function displayResults(data) {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('q-box').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';

            const lv = document.getElementById('list-v');
            const la = document.getElementById('list-a');
            lv.innerHTML = ''; la.innerHTML = '';

            // ترتيب تنازلي للجودات (من الأعلى للأقل)
            const sorted = (data.sizes || []).sort((a, b) => (parseInt(b.height) || 0) - (parseInt(a.height) || 0));

            sorted.forEach(s => {
                const isA = s.resolution === 'audio only' || !s.height;
                const html = `
                    <div class="quality-item" onclick="downloadAction('${s.url}')">
                        <span>${isA ? 'صوت MP3' : s.height+'p'}</span>
                        <i class="fas fa-download" style="color:#00e5ff"></i>
                    </div>
                `;
                if(isA) la.innerHTML += html; else lv.innerHTML += html;
            });
        }
    </script>
</body>
</html>
