<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh Egypt | Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --bg-dark: #02040a; --glass: rgba(15, 23, 42, 0.9); --neon-blue: #00f2ff; --neon-purple: #bc13fe; --text-main: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { min-height: 100vh; background: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; margin-top: 40px; }
        .logo { font-size: 45px; font-weight: 900; text-align: center; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        #url { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #1e293b; background: #0a1120; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 900; font-size: 17px; color: white; cursor: pointer; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); transition: 0.3s; }
        .main-btn:disabled { opacity: 0.6; }
        #yt-preview { margin-top: 20px; display: none; text-align: center; }
        #yt-thumb { width: 100%; border-radius: 12px; border: 1px solid var(--neon-blue); }
        .quality-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.07); padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .quality-card:hover { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
    </style>
</head>
<body>
    <div class="container" id="main-view">
        <div class="logo">Darsh Egypt</div>
        <div class="glass-card">
            <input type="text" id="url" placeholder="ضع رابط الفيديو هنا...">
            <button id="download-btn" class="main-btn" onclick="startDownload()">تحميل الآن ⬇</button>
            <div id="yt-preview">
                <img id="yt-thumb" src="" alt="">
                <p id="yt-title" style="margin-top:10px; font-size:14px; font-weight:bold;"></p>
                <p style="color:var(--neon-blue); font-size:12px; margin-top:5px;">جاري تجهيز الروابط... ✨</p>
            </div>
        </div>
    </div>

    <div class="container" id="quality-view" style="display:none;">
        <div class="glass-card">
            <h3 style="text-align:center; margin-bottom:20px; color:var(--neon-blue);">روابط التحميل المباشرة</h3>
            <div id="links-list"></div>
            <button class="main-btn" style="margin-top:20px; background:transparent; border:1px solid #444;" onclick="location.reload()">رجوع 🔙</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
